<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMSPro Application Details</title>
    <style>
        :root {
            --bg-color: #1a1b26;
            --sidebar-bg: #16161e;
            --content-bg: #1a1b26;
            --text-color: #a9b1d6;
            --header-color: #c0caf5;
            --link-color: #7aa2f7;
            --link-hover-color: #b4c8f0;
            --code-bg: #1e202e;
            --border-color: #3b4261;
            --highlight-bg: #292e42;
            --comment-color: #565f89;
            --key-color: #7dcfff;
            --string-color: #9ece6a;
            --number-color: #ff9e64;
            --boolean-color: #bb9af7;
            --null-color: #f7768e;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.7;
            margin: 0;
            padding: 0;
            display: flex;
        }
        .sidebar {
            width: 300px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            padding: 1.5rem;
            box-sizing: border-box;
        }
        .sidebar-header {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--header-color);
            margin-bottom: 2rem;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .sidebar > ul > li > button {
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            text-align: left;
            background: none;
            border: none;
            color: var(--header-color);
            padding: 0.5rem 0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sidebar .sub-menu {
            padding-left: 1rem;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-in-out;
        }
        .sidebar .sub-menu.open {
            max-height: 1000px; /* Adjust as needed */
        }
        .sidebar .sub-menu li a {
            display: block;
            color: var(--text-color);
            text-decoration: none;
            padding: 0.4rem 0;
            font-size: 0.9rem;
            border-left: 2px solid transparent;
            padding-left: 0.5rem;
            transition: all 0.2s ease;
        }
        .sidebar .sub-menu li a:hover {
            color: var(--link-hover-color);
        }
        .sidebar .sub-menu li a.active {
            color: var(--link-color);
            border-left-color: var(--link-color);
            font-weight: 500;
        }
        .main-content {
            margin-left: 300px;
            padding: 2rem 3rem;
            width: calc(100% - 300px);
            box-sizing: border-box;
        }
        h1, h2, h3 {
            color: var(--header-color);
            margin-top: 0;
            margin-bottom: 1rem;
            line-height: 1.3;
        }
        h1 { font-size: 2.5rem; border-bottom: 2px solid var(--border-color); padding-bottom: 0.5rem; }
        section > h2 { font-size: 2rem; margin-top: 4rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; }
        article > h3 { font-size: 1.5rem; color: var(--link-color); margin-top: 3rem; }
        p, .endpoint-meta, ul, li { margin-bottom: 1rem; }
        ul { padding-left: 1.5rem; }
        .endpoint-meta span {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-family: "Fira Code", "Consolas", monospace;
            font-size: 0.9em;
            margin-right: 0.5rem;
        }
        .endpoint-meta .method-POST { background-color: #49cc90; color: #fff; font-weight: bold; }
        .endpoint-meta .method-GET { background-color: #61affe; color: #fff; font-weight: bold; }
        .endpoint-meta .method-PUT { background-color: #fca130; color: #fff; font-weight: bold; }
        .endpoint-meta .method-DELETE { background-color: #f93e3e; color: #fff; font-weight: bold; }
        .endpoint-meta .path { background-color: var(--highlight-bg); color: var(--text-color); }
        pre {
            background-color: var(--code-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 1rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: "Fira Code", "Consolas", "Monaco", monospace;
            font-size: 0.9em;
            overflow-x: auto;
        }
        code .comment { color: var(--comment-color); }
        code .key { color: var(--key-color); }
        code .string { color: var(--string-color); }
        code .number { color: var(--number-color); }
        code .boolean { color: var(--boolean-color); }
        code .null { color: var(--null-color); }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            text-align: left;
        }
        th {
            background-color: var(--highlight-bg);
            font-weight: bold;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--sidebar-bg); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">WMSPro Details</div>
        <nav>
            <ul id="sidebar-nav">
                <!-- Navigation items will be injected by JS -->
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <div id="content-sections">
             <!-- Content sections will be injected by JS -->
        </div>
    </main>
    <script>
        const documentationData = {
            "Introduction": {
                "Overview": {
                    title: "Application Overview",
                    content: `
                        <p>WMSPro is a comprehensive Warehouse Management System designed to streamline and automate warehouse operations. Built with a modern tech stack, it provides a robust platform for managing inventory, orders, suppliers, and logistics with efficiency and intelligence.</p>
                        <p>The application is structured into several core modules, each handling a specific domain of warehouse management. It integrates AI-powered features to enhance productivity and decision-making.</p>
                    `
                },
                 "Technology Stack": {
                    title: "Technology Stack",
                    content: `
                        <p>The frontend is built using a modern, performant, and scalable technology stack:</p>
                        <ul>
                            <li><strong>Framework:</strong> Next.js (with React 18)</li>
                            <li><strong>Language:</strong> TypeScript</li>
                            <li><strong>Styling:</strong> Tailwind CSS</li>
                            <li><strong>State Management:</strong> React Context API for centralized, modular state management.</li>
                            <li><strong>API Communication:</strong> A custom wrapper around the native <code>fetch</code> API for communicating with the backend.</li>
                             <li><strong>AI Integration:</strong> Google Gemini API for intelligent features.</li>
                        </ul>
                    `
                },
            },
            "Key Features": {
                 "AI Integration (Gemini)": {
                    title: "AI Integration (Gemini)",
                    content: `
                        <p>WMSPro leverages the Google Gemini API to provide intelligent assistance throughout the application, automating tasks and offering smart suggestions.</p>
                        <ul>
                            <li><strong>Product Management:</strong> Automatic generation of SKUs, product codes, compelling descriptions, and category suggestions.</li>
                            <li><strong>Location Management:</strong> Smart suggestions for optimal put-away locations based on product type and warehouse rules. Automatic generation of location codes and names.</li>
                            <li><strong>Data Validation:</strong> AI-powered validation for user inputs like customer and product names to ensure data quality.</li>
                            <li><strong>Analytics:</strong> Generation of executive summaries for reports and sales forecasting based on historical data.</li>
                            <li><strong>Geocoding:</strong> Conversion of warehouse addresses into latitude/longitude coordinates for map visualization.</li>
                        </ul>
                    `
                },
                "Role-Based Access Control": {
                    title: "Role-Based Access Control (RBAC)",
                    content: `
                        <p>The application implements a robust RBAC system to ensure users can only access modules and perform actions relevant to their roles.</p>
                        <table>
                            <thead>
                                <tr><th>Role</th><th>Description</th></tr>
                            </thead>
                            <tbody>
                                <tr><td>Admin</td><td>Full system access. Can manage users, configurations, and all warehouse operations.</td></tr>
                                <tr><td>Warehouse Manager</td><td>High-level operational control. Can manage inventory, operations, and reporting, but not system-level user management.</td></tr>
                                <tr><td>Picker</td><td>Focused on outbound operations. Responsible for picking items from locations for customer orders.</td></tr>
                                <tr><td>Receiver</td><td>Focused on inbound operations. Responsible for receiving new stock and preparing it for put-away.</td></tr>
                                <tr><td>Analyst</td><td>Read-only access to data and reports. Can view dashboards, analytics, and generate forecasts.</td></tr>
                            </tbody>
                        </table>
                    `
                },
                "Internationalization (i18n)": {
                    title: "Internationalization (i18n)",
                    content: `
                        <p>The UI supports multiple languages to cater to a diverse user base. Translations are managed through simple JSON files located in the <code>/locales</code> directory.</p>
                        <ul>
                            <li><strong>Supported Languages:</strong> English (en), Spanish (es), Hindi (hi).</li>
                            <li><strong>Implementation:</strong> A custom React Context (<code>LocaleContext</code>) provides the translation function <code>t()</code> throughout the application.</li>
                        </ul>
                    `
                },
                 "Interactive User Guides": {
                    title: "Interactive User Guides",
                    content: `
                        <p>To facilitate user onboarding and training, WMSPro includes interactive, step-by-step guides for key workflows. These guides highlight UI elements and can automate actions like filling forms and clicking buttons to demonstrate a process.</p>
                    `
                },
            },
            "API Documentation": {
                "Authentication": {
                    method: 'POST',
                    path: '/authentication/Auth/Login',
                    description: 'Authenticates a user and returns a JWT token along with user data.',
                    payload: `{\n    <span class="key">"username"</span>: <span class="string">"admin@propixtech.com"</span>,\n    <span class="key">"password"</span>: <span class="string">"Propix@123"</span>\n}`
                },
                "Get All Products": {
                    method: 'GET',
                    path: '/Product/getAll',
                    description: 'Retrieves a list of all products. The API often returns data in a nested and/or stringified format which is parsed by the frontend.',
                    payload: `// No payload required for GET request`
                },
                "Create Product": {
                    method: 'POST',
                    path: '/Product/Create',
                    description: 'Creates a new product. Note: The payload is a single complex object, not stringified JSON.',
                    payload: `{\n    <span class="key">"productName"</span>: <span class="string">"Quantum SSD"</span>,\n    <span class="key">"sku"</span>: <span class="string">"ELEC-QUA-482"</span>, <span class="comment">// Example</span>\n    <span class="key">"categoryId"</span>: <span class="number">1</span>, <span class="comment">// Numeric ID</span>\n    <span class="key">"supplierId"</span>: <span class="number">1</span>, <span class="comment">// Numeric ID</span>\n    <span class="key">"price"</span>: <span class="number">120.50</span>,\n    <span class="key">"reorderPoint"</span>: <span class="number">20</span>,\n    <span class="key">"variants"</span>: [<span class="comment">{...}</span>],\n    <span class="key">"packaging"</span>: <span class="comment">{...}</span>,\n    <span class="key">"createdBy"</span>: <span class="number">1</span> <span class="comment">// Numeric User ID</span>\n}`
                },
                 "Get All Orders": {
                    method: 'GET',
                    path: '/Order/GetAll',
                    description: 'Retrieves a list of all customer orders.',
                    payload: `// No payload required`
                },
                "Create Order": {
                    method: 'POST',
                    path: '/Order/Create',
                    description: 'Creates a new customer order. The payload contains a nested structure with order details.',
                    payload: `{\n    <span class="key">"orderManagement"</span>: {\n        <span class="key">"orders"</span>: [\n            {\n                <span class="key">"customerName"</span>: <span class="string">"John Doe"</span>,\n                <span class="key">"items"</span>: [ { <span class="key">"productId"</span>: 101, <span class="key">"quantity"</span>: 2, <span class="key">"price"</span>: 99.99 } ]\n            }\n        ]\n    }\n}`
                },
                 "Update Order Status": {
                    method: 'PUT',
                    path: '/Order/update',
                    description: 'Updates an order. Used for status changes. Send only the fields to be changed.',
                    payload: `{\n    <span class="key">"orderManagement"</span>: {\n        <span class="key">"orders"</span>: [ { <span class="key">"id"</span>: 205, <span class="key">"status"</span>: <span class="string">"Processing"</span> } ]\n    }\n}`
                },
                "Receive Shipment": {
                    method: 'POST',
                    path: '/warehouse-management/put-away/create',
                    description: 'Logs the receipt of items against a purchase order and creates a put-away record.',
                    payload: `{\n    <span class="key">"purchaseOrderId"</span>: <span class="number">301</span>,\n    <span class="key">"items"</span>: [ { <span class="key">"productId"</span>: 101, <span class="key">"quantity"</span>: 50 } ],\n    <span class="key">"receivedByUserId"</span>: <span class="number">1</span>,\n    <span class="key">"status"</span>: <span class="string">"Received"</span>\n}`
                }
            }
        };

        const sidebarNav = document.getElementById('sidebar-nav');
        const contentSections = document.getElementById('content-sections');

        Object.entries(documentationData).forEach(([moduleName, subModules]) => {
            const sectionId = moduleName.toLowerCase().replace(/ & /g, '-').replace(/ /g, '-').replace(/\(|\)/g, '');
            
            const li = document.createElement('li');
            const button = document.createElement('button');
            button.innerHTML = `${moduleName} <span>&#9662;</span>`;
            const subMenu = document.createElement('ul');
            subMenu.className = 'sub-menu open'; // Start open
            
            const section = document.createElement('section');
            section.id = sectionId;
            const h2 = document.createElement('h2');
            h2.textContent = moduleName;
            section.appendChild(h2);
            
            Object.entries(subModules).forEach(([subModuleName, details]) => {
                const subId = `${sectionId}-${subModuleName.toLowerCase().replace(/ /g, '-')}`;

                const subLi = document.createElement('li');
                const a = document.createElement('a');
                a.href = `#${subId}`;
                a.textContent = subModuleName;
                subLi.appendChild(a);
                subMenu.appendChild(subLi);

                const article = document.createElement('article');
                article.id = subId;
                
                if (details.content) { // For descriptive sections
                     article.innerHTML = `<h3>${details.title}</h3>${details.content}`;
                } else { // For API endpoint sections
                     article.innerHTML = `
                        <h3>${subModuleName}</h3>
                        <div class="endpoint-meta">
                            <span class="method-${details.method}">${details.method}</span>
                            <span class="path">${details.path}</span>
                        </div>
                        <p>${details.description}</p>
                        <h4>Request Payload</h4>
                        <pre><code>${details.payload}</code></pre>
                    `;
                }

                section.appendChild(article);
            });

            li.appendChild(button);
            li.appendChild(subMenu);
            sidebarNav.appendChild(li);
            contentSections.appendChild(section);

            button.addEventListener('click', () => {
                subMenu.classList.toggle('open');
                button.querySelector('span').innerHTML = subMenu.classList.contains('open') ? '&#9652;' : '&#9662;';
            });
        });

        const links = document.querySelectorAll('.sidebar a');
        const sections = document.querySelectorAll('.main-content article, .main-content > section');

        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    links.forEach(link => {
                        const targetId = `#${entry.target.id}`;
                        if (link.getAttribute('href') === targetId) {
                            links.forEach(l => l.classList.remove('active'));
                            link.classList.add('active');
                        }
                    });
                }
            });
        }, { rootMargin: '0px 0px -80% 0px', threshold: 0 });

        sections.forEach(section => observer.observe(section));

    </script>
</body>
</html>
